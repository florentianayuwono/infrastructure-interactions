# Squid proxy configuration for demo environment
# Imitates egress.ps7.internal:3128
# Upstream source: git+ssh://charlie4284@git.launchpad.net/~charlie4284/canonical-is-internal-proxy-configs
# Firewall rules source: git+ssh://charlie4284@git.launchpad.net/canonical-is-firewalls
#
# Generated by scripts/sync-from-upstream.sh
#
# Upstream context:
#   PS7 egress proxies (91.189.92.10/11/12) run Squid as the sole outbound
#   HTTP/HTTPS path for PS7 instances.  Access is split:
#     - canonical-is-firewalls controls which hosts reach tcp/3128
#     - canonical-is-internal-proxy-configs controls allowed destinations
#
#   From rules/is/squid.yaml (canonical-is-firewalls):
#     - squid.internal allows outbound: ftp, http, https, matrix-federation, ping
#     - Access from: rfc1918 10.x (10.0.0.0/8), VPN, internal subnets
#
#   Demo mapping:
#     squid.internal (91.189.92.10/11/12) → this VM (10.142.65.2)
#     rfc1918-10 (10.0.0.0/8)            → 10.142.0.0/16 (demo LXD network)
#     squid port (defs/ports.yaml)        → tcp/3128
#     upstream internal DNS               → 10.142.65.3 (dns-server LXD VM)

# Port — defs/ports.yaml: squid: [tcp/3128]
http_port 3128

# ── ACLs ────────────────────────────────────────────────────────────────────

acl demo_network src 10.142.0.0/16
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localhost src 127.0.0.1/32

# Allowed outbound ports — mirrors upstream squid.internal allowed ports:
#   ftp (21), http (80), https (443), matrix-federation (8448)
# Plus operational ports: squid (3128), ssh (22), dns (53)
acl Safe_ports port 21      # ftp      (upstream: ftp)
acl Safe_ports port 80      # http     (upstream: http)
acl Safe_ports port 443     # https    (upstream: https)
acl Safe_ports port 3128    # squid    (upstream: squid)
acl Safe_ports port 22      # ssh
acl Safe_ports port 8448    # matrix   (upstream: matrix-federation)
acl Safe_ports port 53      # dns

acl CONNECT method CONNECT

# ── Access rules ─────────────────────────────────────────────────────────────

http_access deny !Safe_ports
http_access deny CONNECT !Safe_ports

# Allow from demo network (upstream: rfc1918-10 → squid.internal)
http_access allow demo_network
http_access allow localnet
http_access allow localhost

# Deny everything else (upstream default deny)
http_access deny all

# ── Logging ──────────────────────────────────────────────────────────────────

access_log /var/log/squid/access.log

# ── Cache ────────────────────────────────────────────────────────────────────

cache_dir ufs /var/spool/squid 100 16 256
cache_mem 64 MB

# ── DNS ──────────────────────────────────────────────────────────────────────

# Primary: demo DNS VM (mirrors upstream internal DNS usage)
# Fallback: Google public DNS
dns_nameservers 10.142.65.3 8.8.8.8

# ── Refresh patterns ─────────────────────────────────────────────────────────

refresh_pattern ^ftp:           1440    20%     10080
refresh_pattern ^gopher:        1440    0%      1440
refresh_pattern -i (/cgi-bin/|\?) 0     0%      0
refresh_pattern .               0       20%     4320
