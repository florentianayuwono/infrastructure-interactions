# Squid proxy configuration
# Imitates egress.ps7.internal:3128

http_port 3128

cache_dir ufs /var/spool/squid 100 16 256
access_log /var/log/squid/access.log squid

cache_mem 64 MB
maximum_object_size 512 MB

# ACLs
acl localnet src 10.150.0.0/24
acl localnet src 10.151.0.0/16
acl localnet src 10.152.0.0/16
acl localnet src 10.156.0.0/16
acl SSL_ports port 443
acl Safe_ports port 80		# http
acl Safe_ports port 443		# https
acl CONNECT method CONNECT

# Access rules
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localnet
http_access deny all

# No proxy for internal services
acl no_proxy dstdomain .svc .cluster.local .internal .local
http_access allow no_proxy

# DNS
dns_nameservers 10.150.0.3

# Performance
cache_effective_user proxy
cache_effective_group proxy
