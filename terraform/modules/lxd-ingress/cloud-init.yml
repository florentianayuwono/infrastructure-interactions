#cloud-config
package_update: true
packages:
  - haproxy
  - openssl

write_files:
  - path: /etc/haproxy/haproxy.cfg
    content: |
      ${haproxy_cfg}
    owner = root:root
    permissions: '0644'

runcmd:
  - mkdir -p /etc/haproxy/ssl
  - openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/haproxy/ssl/demo.key -out /etc/haproxy/ssl/demo.crt -subj "/CN=demo.local" -addext "subjectAltName=DNS:demo.local,DNS:app.demo.local,DNS:grafana.demo.local"
  - cat /etc/haproxy/ssl/demo.crt /etc/haproxy/ssl/demo.key > /etc/haproxy/ssl/demo.pem
  - systemctl enable haproxy
  - systemctl restart haproxy
  - echo "HAProxy ingress ready on ports 80/443"
